name: Bug report
description: Report reproducible incorrect behaviour.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, seed, and relevant contract or file paths.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or evidence
      description: Remove secrets and sensitive information.
