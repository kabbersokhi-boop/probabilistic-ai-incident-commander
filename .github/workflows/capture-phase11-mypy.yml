name: Capture Phase 11 mypy diagnostics

on:
  push:
    branches:
      - agent/phase11-authoritative-soak-certification

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/phase11-authoritative-soak-certification
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Capture mypy output
        run: |
          set +e
          python -m mypy scripts/phase11_authoritative_soak.py tests/test_phase11_authoritative_soak.py > .github/phase11-mypy.txt 2>&1
          code=$?
          echo "exit_code=$code" >> .github/phase11-mypy.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git rm .github/workflows/capture-phase11-mypy.yml
          git add .github/phase11-mypy.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Capture Phase 11 mypy diagnostics"
          git push origin HEAD:agent/phase11-authoritative-soak-certification
