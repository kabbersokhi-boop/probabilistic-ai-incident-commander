name: Apply exact Ruff import fix

on:
  push:
    branches: [feat/phase11-reader-coherence]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/phase11-reader-coherence
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: |
          python -m ruff check --fix tests/test_reader_coherence_certification.py
          python -m ruff format tests/test_reader_coherence_certification.py
      - run: |
          rm -f .github/reader-lint-output.txt
          rm .github/workflows/capture-reader-lint.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply exact Ruff import fix'
          git push origin HEAD:feat/phase11-reader-coherence
