name: Capture final Ruff diagnostic

on:
  push:
    branches: [feat/phase11-reader-coherence]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/phase11-reader-coherence
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check . > .github/reader-lint-output.txt 2>&1 || true
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/reader-lint-output.txt
          git commit -m 'Capture final Ruff diagnostic'
          git push origin HEAD:feat/phase11-reader-coherence
