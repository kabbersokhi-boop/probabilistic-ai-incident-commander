name: phase-0-contracts

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Validate contracts
        run: python -m paic validate --spec-dir specs
      - name: Format check
        run: python -m ruff format --check .
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy src tests
      - name: Test with coverage
        run: python -m pytest --cov=paic --cov-report=term-missing
      - name: Verify generated schemas
        run: |
          rm -rf schemas-generated
          python -m paic export-schemas --output-dir schemas-generated
          diff -ru schemas schemas-generated
