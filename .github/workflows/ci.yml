name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      POLARS_MAX_THREADS: "4"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Validate contracts
        run: python -m paic validate --spec-dir specs
      - name: Format check
        run: python -m ruff format --check .
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy src tests
      - name: Test with coverage
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -p pytest_cov.plugin --cov=paic --cov-report=term-missing
      - name: Verify generated schemas
        run: |
          rm -rf schemas-generated
          python -m paic export-schemas --output-dir schemas-generated
          diff -ru schemas schemas-generated
      - name: Generate, analyse, detect, and validate smoke dataset
        run: |
          python -m paic simulate \
            --config configs/simulation/smoke.yaml \
            --output-dir .artifacts/smoke
          python -m paic dataset validate --dataset-dir .artifacts/smoke
          python -m paic analytics build \
            --dataset-dir .artifacts/smoke \
            --config configs/analytics/smoke.yaml \
            --output-dir .artifacts/analytics-smoke
          python -m paic analytics validate \
            --analytics-dir .artifacts/analytics-smoke \
            --dataset-dir .artifacts/smoke
          python -m paic analytics summary \
            --analytics-dir .artifacts/analytics-smoke \
            > .artifacts/analytics-smoke-summary.json
          python -m paic detection build \
            --analytics-dir .artifacts/analytics-smoke \
            --config configs/detection/smoke.yaml \
            --output-dir .artifacts/detection-smoke
          python -m paic detection validate \
            --detection-dir .artifacts/detection-smoke \
            --analytics-dir .artifacts/analytics-smoke
          python -m paic detection summary \
            --detection-dir .artifacts/detection-smoke \
            > .artifacts/detection-smoke-summary.json
      - name: Build and validate customer-impact smoke artifact
        run: |
          python -m paic simulate \
            --config configs/simulation/impact-smoke.yaml \
            --output-dir .artifacts/impact-source-smoke
          python -m paic impact build \
            --dataset-dir .artifacts/impact-source-smoke \
            --config configs/impact/smoke.yaml \
            --output-dir .artifacts/impact-smoke
          python -m paic impact validate \
            --impact-dir .artifacts/impact-smoke \
            --dataset-dir .artifacts/impact-source-smoke
      - name: Build and validate operational evidence smoke artifact
        run: |
          python -m paic evidence build \
            --dataset-dir .artifacts/impact-source-smoke \
            --impact-dir .artifacts/impact-smoke \
            --config configs/evidence/smoke.yaml \
            --output-dir .artifacts/evidence-smoke
          python -m paic evidence validate \
            --evidence-dir .artifacts/evidence-smoke \
            --dataset-dir .artifacts/impact-source-smoke \
            --impact-dir .artifacts/impact-smoke
      - name: Governed Tool Gateway smoke
        run: |
          python -m paic tools list > .artifacts/tool-catalogue.json
          python - <<'PY'
          import json
          from pathlib import Path
          Path('.artifacts/tool-request.json').write_text(json.dumps({
              'tool': 'artifacts.summary',
              'incident_id': 'smoke',
              'role': 'investigator',
              'dataset_dir': '.artifacts/smoke',
              'analytics_dir': '.artifacts/analytics-smoke',
              'detection_dir': '.artifacts/detection-smoke',
              'audit_dir': '.artifacts/tool-audit',
              'arguments': {},
          }))
          PY
          python -m paic tools invoke --request .artifacts/tool-request.json
          python -m paic tools audit validate --audit-dir .artifacts/tool-audit
      - name: Offline probabilistic investigation smoke
        run: |
          python examples/build_scripted_investigation_inputs.py \
            --dataset-dir .artifacts/impact-source-smoke \
            --evidence-dir .artifacts/evidence-smoke \
            --config configs/investigation/smoke.yaml \
            --impact-dir .artifacts/impact-smoke \
            --request .artifacts/investigation-request.json \
            --script .artifacts/investigation-provider-script.json \
            --audit-dir .artifacts/investigation-tool-audit
          python -m paic investigate run \
            --request .artifacts/investigation-request.json \
            --config configs/investigation/smoke.yaml \
            --provider-script .artifacts/investigation-provider-script.json \
            --output-dir .artifacts/investigation-smoke
          python -m paic investigate validate \
            --investigation-dir .artifacts/investigation-smoke \
            --dataset-dir .artifacts/impact-source-smoke \
            --impact-dir .artifacts/impact-smoke \
            --evidence-dir .artifacts/evidence-smoke
          python -m paic investigate replay \
            --investigation-dir .artifacts/investigation-smoke \
            > .artifacts/investigation-replay.json
          python -m paic tools audit validate \
            --audit-dir .artifacts/investigation-tool-audit
      - name: Governed remediation and approval smoke
        run: |
          export PAIC_APPROVAL_SECRET="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          export PAIC_APPROVER_ONCALL_PRIMARY_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          export PAIC_APPROVER_CHANGE_MANAGER_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          python examples/build_remediation_smoke_inputs.py \
            --investigation-dir .artifacts/investigation-smoke \
            --state-input .artifacts/remediation-state-input.json \
            --proposal .artifacts/remediation-proposal.json
          python -m paic remediate state build \
            --input .artifacts/remediation-state-input.json \
            --output-dir .artifacts/remediation-state
          python -m paic remediate plan build \
            --investigation-dir .artifacts/investigation-smoke \
            --state-dir .artifacts/remediation-state \
            --proposal .artifacts/remediation-proposal.json \
            --config configs/remediation/smoke.yaml \
            --output-dir .artifacts/remediation-plan
          python examples/build_remediation_smoke_inputs.py \
            --plan-dir .artifacts/remediation-plan \
            --decision-one .artifacts/remediation-decision-one.json \
            --decision-two .artifacts/remediation-decision-two.json \
            --execution-request .artifacts/remediation-execution-request.json
          python -m paic remediate approval record \
            --plan-dir .artifacts/remediation-plan \
            --approval-dir .artifacts/remediation-approval \
            --decision .artifacts/remediation-decision-one.json
          python -m paic remediate approval record \
            --plan-dir .artifacts/remediation-plan \
            --approval-dir .artifacts/remediation-approval \
            --decision .artifacts/remediation-decision-two.json
          python -m paic remediate token issue \
            --plan-dir .artifacts/remediation-plan \
            --approval-dir .artifacts/remediation-approval \
            --at 2026-07-18T00:07:00+00:00 \
            --output .artifacts/remediation-approval.token
          python -m paic remediate execute \
            --plan-dir .artifacts/remediation-plan \
            --state-dir .artifacts/remediation-state \
            --state-store .artifacts/remediation-state-store \
            --approval-dir .artifacts/remediation-approval \
            --token-file .artifacts/remediation-approval.token \
            --request .artifacts/remediation-execution-request.json \
            --output-state-dir .artifacts/remediation-state-after \
            --output-dir .artifacts/remediation-execution
          python -m paic remediate state validate \
            --state-dir .artifacts/remediation-state-after
          python -m paic remediate plan validate \
            --plan-dir .artifacts/remediation-plan \
            --investigation-dir .artifacts/investigation-smoke \
            --state-dir .artifacts/remediation-state
          python -m paic remediate execution validate \
            --execution-dir .artifacts/remediation-execution
          rm -f .artifacts/remediation-approval.token
      - name: Recovery verification and reopening smoke
        run: |
          receipt_sha="$(python -c 'import json; print(json.load(open(".artifacts/remediation-execution/receipt.json"))["receipt_sha256"])')"
          python examples/build_recovery_smoke_inputs.py \
            --execution-receipt-sha256 "$receipt_sha" \
            --output-dir .artifacts/recovery-inputs
          python -m paic recovery evaluate \
            --config configs/recovery/smoke.yaml \
            --observations .artifacts/recovery-inputs/healthy.json \
            --execution-dir .artifacts/remediation-execution \
            --output-dir .artifacts/recovery-healthy
          python -m paic recovery validate \
            --recovery-dir .artifacts/recovery-healthy \
            --execution-dir .artifacts/remediation-execution
          python -m paic recovery state apply \
            --recovery-dir .artifacts/recovery-healthy \
            --state-store .artifacts/recovery-state
          set +e
          python -m paic recovery evaluate \
            --config configs/recovery/smoke.yaml \
            --observations .artifacts/recovery-inputs/regression.json \
            --execution-dir .artifacts/remediation-execution \
            --output-dir .artifacts/recovery-regression
          test "$?" -eq 1
          python -m paic recovery state apply \
            --recovery-dir .artifacts/recovery-regression \
            --state-store .artifacts/recovery-state
          test "$?" -eq 1
          set -e
          python -m paic recovery state validate \
            --state-store .artifacts/recovery-state
      - name: Generate, analyse, detect, and validate standard dataset
        if: matrix.python-version == '3.11'
        run: |
          python -m paic simulate \
            --config configs/simulation/standard.yaml \
            --output-dir .artifacts/standard
          python -m paic dataset validate --dataset-dir .artifacts/standard
          python -m paic analytics build \
            --dataset-dir .artifacts/standard \
            --config configs/analytics/standard.yaml \
            --output-dir .artifacts/analytics-standard
          python -m paic analytics validate \
            --analytics-dir .artifacts/analytics-standard \
            --dataset-dir .artifacts/standard
          python -m paic detection build \
            --analytics-dir .artifacts/analytics-standard \
            --config configs/detection/standard.yaml \
            --output-dir .artifacts/detection-standard
          python -m paic detection validate \
            --detection-dir .artifacts/detection-standard \
            --analytics-dir .artifacts/analytics-standard
          python -m paic detection summary \
            --detection-dir .artifacts/detection-standard \
            > .artifacts/detection-standard-summary.json
      - name: Build and validate customer-impact standard artifact
        if: matrix.python-version == '3.11'
        run: |
          python -m paic simulate \
            --config configs/simulation/impact-standard.yaml \
            --output-dir .artifacts/impact-source-standard
          python -m paic impact build \
            --dataset-dir .artifacts/impact-source-standard \
            --config configs/impact/standard.yaml \
            --output-dir .artifacts/impact-standard
          python -m paic impact validate \
            --impact-dir .artifacts/impact-standard \
            --dataset-dir .artifacts/impact-source-standard
          python -m paic impact summary \
            --impact-dir .artifacts/impact-standard \
            > .artifacts/impact-standard-summary.json
      - name: Build and validate operational evidence standard artifact
        if: matrix.python-version == '3.11'
        run: |
          python -m paic evidence build \
            --dataset-dir .artifacts/impact-source-standard \
            --impact-dir .artifacts/impact-standard \
            --config configs/evidence/standard.yaml \
            --output-dir .artifacts/evidence-standard
          python -m paic evidence validate \
            --evidence-dir .artifacts/evidence-standard \
            --dataset-dir .artifacts/impact-source-standard \
            --impact-dir .artifacts/impact-standard
          python -m paic evidence summary \
            --evidence-dir .artifacts/evidence-standard \
            > .artifacts/evidence-standard-summary.json
      - name: Offline probabilistic investigation standard
        if: matrix.python-version == '3.11'
        run: |
          python examples/build_scripted_investigation_inputs.py \
            --dataset-dir .artifacts/impact-source-standard \
            --evidence-dir .artifacts/evidence-standard \
            --config configs/investigation/standard.yaml \
            --impact-dir .artifacts/impact-standard \
            --request .artifacts/investigation-standard-request.json \
            --script .artifacts/investigation-standard-provider-script.json \
            --audit-dir .artifacts/investigation-standard-audit
          python -m paic investigate run \
            --request .artifacts/investigation-standard-request.json \
            --config configs/investigation/standard.yaml \
            --provider-script .artifacts/investigation-standard-provider-script.json \
            --output-dir .artifacts/investigation-standard
          python -m paic investigate validate \
            --investigation-dir .artifacts/investigation-standard \
            --dataset-dir .artifacts/impact-source-standard \
            --impact-dir .artifacts/impact-standard \
            --evidence-dir .artifacts/evidence-standard
          python -m paic investigate replay \
            --investigation-dir .artifacts/investigation-standard \
            > .artifacts/investigation-standard-replay.json
      - name: Build package
        if: matrix.python-version == '3.11'
        run: python -m build
