name: Fix reader coherence lint

on:
  push:
    branches: [feat/phase11-reader-coherence]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/phase11-reader-coherence
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check --fix .
      - run: python -m ruff format .
      - run: |
          rm .github/workflows/fix-reader-coherence-lint.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Apply reader coherence lint fixes'
          git push origin HEAD:feat/phase11-reader-coherence
