name: Capture reader coherence lint

on:
  push:
    branches: [feat/phase11-reader-coherence]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/phase11-reader-coherence
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: |
          python -m ruff check --fix . > .github/reader-coherence-lint.txt 2>&1 || true
          python -m ruff format .
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Capture reader coherence lint diagnostics'
          git push origin HEAD:feat/phase11-reader-coherence
