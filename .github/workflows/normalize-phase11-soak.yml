name: Normalize Phase 11 soak changes

on:
  push:
    branches:
      - agent/phase11-authoritative-soak-certification

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/phase11-authoritative-soak-certification
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Normalize
        run: |
          python -m ruff format scripts/phase11_authoritative_soak.py tests/test_phase11_authoritative_soak.py
          python -m ruff check --fix scripts/phase11_authoritative_soak.py tests/test_phase11_authoritative_soak.py
      - name: Verify focused changes
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python -m pytest -q tests/test_phase11_authoritative_soak.py
          python -m ruff format --check scripts/phase11_authoritative_soak.py tests/test_phase11_authoritative_soak.py
          python -m ruff check scripts/phase11_authoritative_soak.py tests/test_phase11_authoritative_soak.py
      - name: Commit normalized files
        run: |
          git rm .github/workflows/normalize-phase11-soak.yml
          git add scripts/phase11_authoritative_soak.py tests/test_phase11_authoritative_soak.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Normalize authoritative soak certification"
          git push origin HEAD:agent/phase11-authoritative-soak-certification
