name: Phase 11 inspection and authoritative soak

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: phase11-authoritative-soak-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  authoritative-soak:
    name: ${{ github.event_name == 'workflow_dispatch' && 'authoritative endurance certification' || 'pull-request inspection gate' }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      POLARS_MAX_THREADS: "4"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      CERTIFICATION_MODE: ${{ github.event_name == 'workflow_dispatch' && 'endurance' || 'inspection' }}
      MIN_DURATION_SECONDS: ${{ github.event_name == 'workflow_dispatch' && '1800' || '0' }}
      EXPECTED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      SOAK_DIR: .artifacts/phase11-${{ github.event_name == 'workflow_dispatch' && 'endurance' || 'inspection' }}-${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify exact checked-out commit
        env:
          EXPECTED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Verify threshold regressions
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q tests/test_phase11_authoritative_soak.py

      - name: Build authoritative workspace
        run: make tui-smoke

      - name: Run authoritative soak
        run: >-
          python scripts/phase11_authoritative_soak.py
          --workspace configs/tui/smoke.yaml
          --output-dir "$SOAK_DIR"
          --iterations 25
          --duration-seconds "$MIN_DURATION_SECONDS"
          --mode "$CERTIFICATION_MODE"
          --warmup 10
          --max-fd-delta 0
          --max-gc-delta 2048
          --max-rss-delta 67108864

      - name: Validate certification summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["SOAK_DIR"]) / "summary.json"
          metadata = json.loads(
              (Path(os.environ["SOAK_DIR"]) / "metadata.json").read_text(encoding="utf-8")
          )
          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          errors = []
          expected_commit = os.environ["EXPECTED_COMMIT"]
          if metadata.get("commit") != expected_commit or summary.get("commit") != expected_commit:
              errors.append(
                  f"commit metadata={metadata.get('commit')} summary={summary.get('commit')} expected={expected_commit}"
              )
          if metadata.get("mode") != os.environ["CERTIFICATION_MODE"]:
              errors.append(f"mode={metadata.get('mode')}")
          if not metadata.get("workspace_sha256") or not metadata.get("resolved_configuration_sha256"):
              errors.append("missing workspace/configuration hash")
          if summary["iterations"] < 25:
              errors.append(f"iterations={summary['iterations']}")
          expected_duration = float(os.environ["MIN_DURATION_SECONDS"])
          if summary["minimum_duration_seconds"] != expected_duration:
              errors.append(
                  "minimum_duration_seconds="
                  f"{summary['minimum_duration_seconds']} expected={expected_duration}"
              )
          if summary["cumulative_inspection_seconds"] < expected_duration:
              errors.append(
                  "cumulative_inspection_seconds="
                  f"{summary['cumulative_inspection_seconds']} expected>={expected_duration}"
              )
          if summary["minimums_satisfied"] is not True:
              errors.append("minimums_satisfied is not true")
          for key in ("configured_stage_counts", "healthy_stage_counts", "authoritative_stage_counts"):
              if summary[key] != [9]:
                  errors.append(f"{key}={summary[key]}")
          if len(summary["unique_snapshot_hashes"]) != 1:
              errors.append(
                  f"unique_snapshot_hashes={summary['unique_snapshot_hashes']}"
              )
          if set(summary["status_counts"]) != {"healthy"}:
              errors.append(f"status_counts={summary['status_counts']}")
          iterations = [
              json.loads(line)
              for line in (Path(os.environ["SOAK_DIR"]) / "iterations.jsonl")
              .read_text(encoding="utf-8")
              .splitlines()
          ]
          if [item["index"] for item in iterations] != list(range(1, len(iterations) + 1)):
              errors.append("iteration indexes are not contiguous")
          if len({item["snapshot_sha256"] for item in iterations}) != 1:
              errors.append("iteration snapshot hashes are not deterministic")
          if any(item["status"] != "healthy" for item in iterations):
              errors.append("iteration status is not healthy")
          if summary["publication_debris"]:
              errors.append(f"publication_debris={summary['publication_debris']}")
          if summary["fd_delta"] is not None and summary["fd_delta"] > 0:
              errors.append(f"fd_delta={summary['fd_delta']}")
          if summary["gc_object_delta"] > 2048:
              errors.append(f"gc_object_delta={summary['gc_object_delta']}")
          if (
              summary["rss_delta_bytes"] is not None
              and summary["rss_delta_bytes"] > 67108864
          ):
              errors.append(f"rss_delta_bytes={summary['rss_delta_bytes']}")
          if errors:
              raise SystemExit("; ".join(errors))
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Upload authoritative soak evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase11-${{ github.event_name == 'workflow_dispatch' && 'endurance' || 'inspection' }}-python-${{ matrix.python-version }}
          path: ${{ env.SOAK_DIR }}
          if-no-files-found: warn
          retention-days: 90
