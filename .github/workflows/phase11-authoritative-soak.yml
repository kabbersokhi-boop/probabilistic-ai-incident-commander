name: Phase 11 inspection and authoritative soak

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: phase11-authoritative-soak-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  phase11-certification:
    name: ${{ github.event_name == 'workflow_dispatch' && 'authoritative-soak' || 'inspection-gate' }} (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      POLARS_MAX_THREADS: "4"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      SOAK_MODE: ${{ github.event_name == 'workflow_dispatch' && 'authoritative' || 'inspection' }}
      SOAK_DURATION_SECONDS: ${{ github.event_name == 'workflow_dispatch' && '1800' || '0' }}
      SOAK_DIR: .artifacts/phase11-${{ github.event_name == 'workflow_dispatch' && 'authoritative-soak' || 'inspection-gate' }}-${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Verify threshold regressions
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q tests/test_phase11_authoritative_soak.py

      - name: Build authoritative workspace
        run: make tui-smoke

      - name: Run Phase 11 inspection workload
        run: >-
          python scripts/phase11_authoritative_soak.py
          --workspace configs/tui/smoke.yaml
          --output-dir "$SOAK_DIR"
          --iterations 25
          --duration-seconds "$SOAK_DURATION_SECONDS"
          --warmup 10
          --max-fd-delta 0
          --max-gc-delta 2048
          --max-rss-delta 67108864

      - name: Validate certification summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["SOAK_DIR"]) / "summary.json"
          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          expected_duration = float(os.environ["SOAK_DURATION_SECONDS"])
          errors = []
          if summary["iterations"] < 25:
              errors.append(f"iterations={summary['iterations']}")
          if summary["minimum_iterations"] != 25:
              errors.append(f"minimum_iterations={summary['minimum_iterations']}")
          if summary["minimum_duration_seconds"] != expected_duration:
              errors.append(
                  "minimum_duration_seconds="
                  f"{summary['minimum_duration_seconds']} expected={expected_duration}"
              )
          if expected_duration > 0 and summary["cumulative_inspection_seconds"] < expected_duration:
              errors.append(
                  "cumulative_inspection_seconds="
                  f"{summary['cumulative_inspection_seconds']} expected>={expected_duration}"
              )
          if summary["minimums_satisfied"] is not True:
              errors.append("minimums_satisfied is not true")
          if len(summary["unique_snapshot_hashes"]) != 1:
              errors.append(
                  f"unique_snapshot_hashes={summary['unique_snapshot_hashes']}"
              )
          if summary["status_counts"] != {"healthy": summary["iterations"]}:
              errors.append(f"status_counts={summary['status_counts']}")
          if summary["publication_debris"]:
              errors.append(f"publication_debris={summary['publication_debris']}")
          if summary["fd_delta"] is not None and summary["fd_delta"] > 0:
              errors.append(f"fd_delta={summary['fd_delta']}")
          if summary["gc_object_delta"] > 2048:
              errors.append(f"gc_object_delta={summary['gc_object_delta']}")
          if (
              summary["rss_delta_bytes"] is not None
              and summary["rss_delta_bytes"] > 67108864
          ):
              errors.append(f"rss_delta_bytes={summary['rss_delta_bytes']}")
          if errors:
              raise SystemExit("; ".join(errors))
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Upload Phase 11 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase11-${{ env.SOAK_MODE }}-python-${{ matrix.python-version }}
          path: ${{ env.SOAK_DIR }}
          if-no-files-found: warn
          retention-days: 90
